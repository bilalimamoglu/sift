provider:
  provider: openai
  model: gpt-5-nano
  baseUrl: https://api.openai.com/v1
  apiKey: YOUR_API_KEY
  timeoutMs: 20000
  temperature: 0.1
  maxOutputTokens: 400

input:
  stripAnsi: true
  redact: true
  redactStrict: false
  maxCaptureChars: 400000
  maxInputChars: 60000
  headChars: 20000
  tailChars: 20000

runtime:
  rawFallback: true
  verbose: false

presets:
  test-status:
    question: "Did the tests pass? If not, list only the failing tests or suites."
    format: bullets
    policy: test-status

  audit-critical:
    question: "Extract only high and critical vulnerabilities."
    format: json
    policy: audit-critical
    outputContract: '{"status":"ok|insufficient","vulnerabilities":[{"package":string,"severity":"critical|high","remediation":string}],"summary":string}'

  diff-summary:
    question: "Summarize the code changes and mention any risky or high-impact areas."
    format: json
    policy: diff-summary
    outputContract: '{"status":"ok|insufficient","answer":string,"evidence":string[],"risks":string[]}'

  infra-risk:
    question: "Assess whether the infrastructure changes are risky and whether they look safe to apply."
    format: verdict
    policy: infra-risk
