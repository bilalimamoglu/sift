name: release
run-name: release ${{ inputs.version || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version being released, for example 0.3.2
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Read package metadata
        id: pkg
        run: |
          NAME="$(node -e "console.log(require('./package.json').name)")"
          VERSION="$(node -e "console.log(require('./package.json').version)")"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate requested release version
        run: |
          if [ "${{ inputs.version }}" != "${{ steps.pkg.outputs.version }}" ]; then
            echo "workflow_dispatch input version (${{ inputs.version }}) must match package.json version (${{ steps.pkg.outputs.version }})" >&2
            exit 1
          fi

      - name: Require successful CI for this commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          CONCLUSION="$(gh api "/repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=${{ github.sha }}&event=push&status=completed&per_page=1" --jq '.workflow_runs[0].conclusion // ""')"
          if [ "$CONCLUSION" != "success" ]; then
            echo "CI must pass on this exact commit before release. Current conclusion: ${CONCLUSION:-missing}" >&2
            exit 1
          fi

      - name: Fail if release tag already exists
        run: |
          git fetch --tags --force
          if git rev-parse "${{ steps.pkg.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.pkg.outputs.tag }}" >&2
            exit 1
          fi

      - name: Fail if npm version already exists
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "npm version already exists: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test coverage
        run: npm run test:coverage

      - name: Smoke tests
        run: npm run test:smoke

      - name: Dist and packaging E2E
        run: npm run test:e2e

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.pkg.outputs.tag }}" -m "sift ${{ steps.pkg.outputs.tag }}"
          git push origin "${{ steps.pkg.outputs.tag }}"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE=""
          if [ -f "release-notes/${{ steps.pkg.outputs.tag }}.md" ]; then
            NOTES_FILE="release-notes/${{ steps.pkg.outputs.tag }}.md"
          elif [ -f "release-notes/${{ steps.pkg.outputs.version }}.md" ]; then
            NOTES_FILE="release-notes/${{ steps.pkg.outputs.version }}.md"
          fi

          if [ -n "$NOTES_FILE" ]; then
            echo "Using release notes from $NOTES_FILE"
            gh release create "${{ steps.pkg.outputs.tag }}" \
              --title "${{ steps.pkg.outputs.tag }}" \
              --notes-file "$NOTES_FILE"
          else
            echo "No versioned release notes file found; falling back to generated notes."
            gh release create "${{ steps.pkg.outputs.tag }}" \
              --title "${{ steps.pkg.outputs.tag }}" \
              --generate-notes
          fi
