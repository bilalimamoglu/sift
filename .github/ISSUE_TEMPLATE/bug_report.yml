name: Bug report
description: Report a user-visible bug, misleading behavior, or incorrect reduction in sift.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.
        Please keep the report focused on the user-visible problem and how to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug or misleading behavior.
      placeholder: sift reported setup as healthy, but the first provider call failed with a missing API key error.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How can we reproduce it?
      description: Include the command, input shape, and any relevant environment details.
      placeholder: |
        1. Run `sift doctor`
        2. Use this config:
        3. Observe the output and exit code
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: doctor should fail and explain that the API key is still a placeholder.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: sift version
      placeholder: 0.4.2

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.x or 24.x

  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add logs, screenshots, reduced output, or anything else that helps.

